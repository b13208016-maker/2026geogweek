<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>懷GEOG柑仔店 | 2026 GEOG WEEK</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6EF;
    --warm-brown: #5C3D1E;
    --mid-brown: #8B6240;
    --light-brown: #C4A882;
    --accent-red: #C0392B;
    --accent-yellow: #E8C547;
    --accent-green: #4A7C59;
    --card-bg: #FFFDF8;
    --border: #D9C9B0;
    --text-main: #2C1A0E;
    --text-muted: #7A6048;
    --badge-candy: #D4547E;
    --badge-art: #A07800;
    --badge-set: #1D9E75;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background-color: var(--cream);
    color: var(--text-main);
    min-height: 100vh;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(200,160,100,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(192,57,43,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .site-wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* Header */
  .site-header {
    text-align: center;
    padding: 40px 20px 24px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 32px;
  }

  .site-header .subtitle-tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mid-brown);
    background: rgba(196,168,130,0.2);
    padding: 4px 14px;
    border-radius: 2px;
    margin-bottom: 10px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
  }

  .site-header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700;
    color: var(--warm-brown);
    line-height: 1.3;
  }

  .site-header h1 span {
    color: var(--accent-red);
  }

  .site-header .year-tag {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  /* Section */
  .section-block {
    margin-bottom: 36px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .section-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 3px;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .badge-candy { background: #FBEAF0; color: var(--badge-candy); }
  .badge-art { background: #FFF3CD; color: var(--badge-art); }
  .badge-set { background: #E1F5EE; color: var(--badge-set); }

  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--warm-brown);
  }

  .section-title small {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 400;
    margin-left: 6px;
  }

  /* Product Grid */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }

  .product-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.2s;
  }

  .product-card:hover {
    border-color: var(--light-brown);
  }

  .product-card.in-cart {
    border-color: var(--accent-green);
    background: #F4FBF7;
  }

  .product-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-main);
    line-height: 1.4;
  }

  .product-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .product-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }

  .product-price {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent-red);
    font-variant-numeric: tabular-nums;
  }

  /* Quantity Control */
  .qty-control {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .qty-btn {
    width: 30px;
    height: 30px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    color: var(--mid-brown);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .qty-btn:hover { background: rgba(139,98,64,0.1); }
  .qty-btn:active { background: rgba(139,98,64,0.2); }

  .qty-display {
    width: 32px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    line-height: 30px;
    user-select: none;
  }

  /* Combo Cards */
  .combo-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 12px;
  }

  .combo-card.in-cart {
    border-color: var(--badge-set);
    background: #F4FBF7;
  }

  .combo-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--warm-brown);
    margin-bottom: 8px;
  }

  .combo-items {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.8;
    margin-bottom: 12px;
  }

  .combo-items b {
    color: var(--text-main);
    font-weight: 500;
  }

  .combo-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .combo-price-block {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .price-original {
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: line-through;
  }

  .price-sale {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent-red);
  }

  .price-save {
    font-size: 11px;
    background: #FAEEDA;
    color: #633806;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 500;
  }

  .combo-select-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .combo-select-label {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .combo-select {
    flex: 1;
    min-width: 160px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    background: white;
    color: var(--text-main);
    cursor: pointer;
  }

  .combo-select:focus {
    outline: none;
    border-color: var(--light-brown);
  }

  /* Sticker note */
  .sticker-note {
    background: #FFF8DC;
    border: 1px solid #E8C547;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #7A5500;
    margin-bottom: 14px;
    line-height: 1.6;
  }

  /* Cart Summary */
  .cart-summary {
    position: sticky;
    bottom: 16px;
    background: var(--warm-brown);
    color: white;
    border-radius: 14px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    box-shadow: 0 4px 24px rgba(92,61,30,0.3);
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .cart-summary:hover { background: #4A3118; }

  .cart-summary-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .cart-icon {
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .cart-text {
    font-size: 13px;
    opacity: 0.8;
  }

  .cart-amount {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .cart-cta {
    background: var(--accent-yellow);
    color: var(--warm-brown);
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .cart-cta:hover { opacity: 0.9; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,26,14,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--cream);
    border-radius: 16px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px 24px;
    position: relative;
  }

  .modal-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--warm-brown);
    margin-bottom: 20px;
    padding-right: 32px;
  }

  .modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 32px;
    height: 32px;
    background: var(--border);
    border: none;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--warm-brown);
  }

  .modal-close:hover { background: var(--light-brown); color: white; }

  /* Order Summary in modal */
  .order-summary-section {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }

  .order-summary-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .order-item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(217,201,176,0.5);
    font-size: 14px;
    gap: 8px;
  }

  .order-item-row:last-child { border-bottom: none; }

  .order-item-name { color: var(--text-main); flex: 1; }
  .order-item-qty { color: var(--text-muted); white-space: nowrap; }
  .order-item-price { font-weight: 600; color: var(--accent-red); white-space: nowrap; }

  .order-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--warm-brown);
    border-radius: 8px;
    margin-top: 12px;
    color: white;
  }

  .order-total-label { font-size: 14px; font-weight: 500; }
  .order-total-amount { font-size: 22px; font-weight: 700; }

  /* Form */
  .form-section { margin-bottom: 20px; }
  .form-section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-main);
    margin-bottom: 6px;
  }

  .form-label .required { color: var(--accent-red); margin-left: 2px; }

  .form-input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    background: white;
    color: var(--text-main);
    transition: border-color 0.2s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--mid-brown);
  }

  .form-input::placeholder {
    color: #B0A090;
  }

  /* Submit Button */
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent-red);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .submit-btn:hover { background: #A93226; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: var(--light-brown); cursor: not-allowed; }

  /* Success */
  .success-box {
    text-align: center;
    padding: 32px 20px;
  }

  .success-icon {
    width: 64px;
    height: 64px;
    background: #E1F5EE;
    border-radius: 50%;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .success-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent-green);
    margin-bottom: 8px;
  }

  .success-msg {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
  }



  /* Empty cart msg */
  .empty-cart-msg {
    text-align: center;
    font-size: 14px;
    color: var(--text-muted);
    padding: 20px 0;
  }

  /* Error */
  .form-error {
    font-size: 12px;
    color: var(--accent-red);
    margin-top: 4px;
    display: none;
  }

  .form-group.has-error .form-error { display: block; }
  .form-group.has-error .form-input { border-color: var(--accent-red); }

  /* Divider */
  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
    opacity: 0.5;
  }
</style>
</head>
<body>
<div class="site-wrapper">

  <!-- Header -->
  <header class="site-header">
    <div class="subtitle-tag">✦ 期間限定 ✦</div>
    <h1>懷<span>GEOG</span>柑仔店</h1>
    <p class="year-tag">2026 GEOG WEEK</p>
  </header>


  <!-- Section 1: 來點古早味 -->
  <div class="section-block">
    <div class="section-header">
      <span class="section-badge badge-candy">單點</span>
      <h2 class="section-title">來點古早味 <small>每份 30 元（彈珠汽水除外）</small></h2>
    </div>
    <div class="product-grid" id="candy-grid"></div>
  </div>

  <div class="section-divider"></div>

  <!-- Section 2: 怎麼這麼繪 -->
  <div class="section-block">
    <div class="section-header">
      <span class="section-badge badge-art">單點</span>
      <h2 class="section-title">怎麼這麼繪</h2>
    </div>
    <div class="sticker-note">🌟 任選兩張貼紙（茄芷袋貼紙＋鋁箔包貼紙），合購優惠 <b>30 元</b>。系統將自動套用優惠。</div>
    <div class="product-grid" id="art-grid"></div>
  </div>

  <div class="section-divider"></div>

  <!-- Section 3: 套餐 -->
  <div class="section-block">
    <div class="section-header">
      <span class="section-badge badge-set">套餐</span>
      <h2 class="section-title">我全都要</h2>
    </div>
    <div id="combo-grid"></div>
  </div>

  <!-- Cart Bar -->
  <div class="cart-summary" id="cart-bar" onclick="openModal()">
    <div class="cart-summary-left">
      <div class="cart-icon">🛒</div>
      <div>
        <div class="cart-text">購物車</div>
        <div class="cart-amount">NT$ <span id="cart-total">0</span></div>
      </div>
    </div>
    <button class="cart-cta">前往結帳 →</button>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>

    <!-- Checkout view -->
    <div id="checkout-view">
      <div class="modal-title">📋 確認訂單</div>

      <div class="order-summary-section">
        <div class="order-summary-title">訂購明細</div>
        <div id="order-items-list"></div>
        <div class="order-total-row">
          <span class="order-total-label">總金額</span>
          <span class="order-total-amount">NT$ <span id="modal-total">0</span></span>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">填寫訂購資料</div>

        <div class="form-group" id="fg-dept">
          <label class="form-label">系級<span class="required">*</span></label>
          <input class="form-input" type="text" id="field-dept" placeholder="例如：地理二" />
          <div class="form-error" id="err-dept">請填寫系級</div>
        </div>

        <div class="form-group" id="fg-name">
          <label class="form-label">姓名<span class="required">*</span></label>
          <input class="form-input" type="text" id="field-name" placeholder="請輸入姓名" />
          <div class="form-error" id="err-name">請填寫姓名</div>
        </div>

        <div class="form-group" id="fg-email">
          <label class="form-label">電子信箱<span class="required">*</span></label>
          <input class="form-input" type="email" id="field-email" placeholder="example@email.com" />
          <div class="form-error" id="err-email">請填寫有效的電子信箱</div>
        </div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitOrder()">送出訂單</button>
    </div>

    <!-- Success view -->
    <div id="success-view" style="display:none;">
      <div class="success-box">
        <div class="success-icon">🎉</div>
        <div class="success-title">訂單成功送出！</div>
        <p class="success-msg">感謝您的訂購，資料已記錄。<br>期待在 2026 GEOG WEEK 見到你！</p>
        <button onclick="resetAll()" style="margin-top:20px; padding:10px 28px; background:var(--warm-brown); color:white; border:none; border-radius:8px; font-size:14px; font-family:'Noto Sans TC',sans-serif; cursor:pointer; font-weight:700;">繼續選購</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const CANDY_PRODUCTS = [
  { id: 'c1', name: '跳跳糖', desc: '一份 5 包', price: 30 },
  { id: 'c2', name: '仙渣糖', desc: '一份 5 顆', price: 30 },
  { id: 'c3', name: '橡皮糖', desc: '一份 4 條', price: 30 },
  { id: 'c4', name: '足球巧克力', desc: '一份 5 顆', price: 30 },
  { id: 'c5', name: '香辣捲', desc: '一份 1 包', price: 30 },
  { id: 'c6', name: '酸梅棒棒糖', desc: '一份 3 隻', price: 30 },
  { id: 'c7', name: '果凍條', desc: '一份 3 條', price: 30 },
  { id: 'c8', name: '麥芽糖餅', desc: '一份 5 塊', price: 30 },
  { id: 'c9', name: '彈珠汽水', desc: '一瓶', price: 35 },
];

const ART_PRODUCTS = [
  { id: 'a1a', name: '徽章－玉山', desc: '一個', price: 40 },
  { id: 'a1b', name: '徽章－大霸尖山', desc: '一個', price: 40 },
  { id: 'a2', name: '茄芷袋貼紙', desc: '一個', price: 20 },
  { id: 'a3', name: '鋁箔包貼紙', desc: '一個', price: 20 },
];

const BADGE_OPTIONS = ['玉山', '大霸尖山'];

// Candy options for combo (excluding c9 彈珠汽水)
const CANDY_OPTIONS = CANDY_PRODUCTS.filter(p => p.id !== 'c9').map(p => p.name);

const COMBOS = [
  {
    id: 'combo1',
    title: '彈珠汽水 + 古早味零食 × 1 + 徽章',
    desc: '彈珠汽水 1 瓶、古早味零食 1 份（自選）、徽章 1 個（自選款式）',
    originalPrice: 35 + 30 + 40,
    salePrice: 95,
    selectLabel: '選擇古早味零食',
    hasBadgeSelect: true,
  },
  {
    id: 'combo2',
    title: '彈珠汽水 + 古早味零食 × 1 + 兩張貼紙',
    desc: '彈珠汽水 1 瓶、古早味零食 1 份（自選）、茄芷袋貼紙 1 個、鋁箔包貼紙 1 個',
    originalPrice: 35 + 30 + 30,
    salePrice: 90,
    selectLabel: '選擇古早味零食',
    hasBadgeSelect: false,
  },
];

// ============================================================
// STATE
// ============================================================
let cart = {};           // productId -> qty
let comboSelections = {}; // comboId -> selected candy name
let comboBadgeSelections = {}; // comboId -> selected badge (combo1 only)
let comboQty = {};       // comboId -> qty
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyZsCYymEz0u1Linqrj3dQDczIyH9x1wRTFQBP5Q3VVOQXmwXAWys9UgpgAr7VAwTl_/exec';

// ============================================================
// INIT
// ============================================================
function init() {
  renderCandyGrid();
  renderArtGrid();
  renderComboGrid();
}

// ============================================================
// RENDER
// ============================================================
function renderCandyGrid() {
  const grid = document.getElementById('candy-grid');
  grid.innerHTML = CANDY_PRODUCTS.map(p => productCardHTML(p)).join('');
}

function renderArtGrid() {
  const grid = document.getElementById('art-grid');
  grid.innerHTML = ART_PRODUCTS.map(p => productCardHTML(p)).join('');
}

function productCardHTML(p) {
  const qty = cart[p.id] || 0;
  return `
    <div class="product-card ${qty > 0 ? 'in-cart' : ''}" id="card-${p.id}">
      <div class="product-name">${p.name}</div>
      <div class="product-desc">${p.desc}</div>
      <div class="product-footer">
        <span class="product-price">NT$ ${p.price}</span>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
          <span class="qty-display" id="qty-${p.id}">${qty}</span>
          <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
        </div>
      </div>
    </div>`;
}

function renderComboGrid() {
  const grid = document.getElementById('combo-grid');
  grid.innerHTML = COMBOS.map(combo => {
    const qty = comboQty[combo.id] || 0;
    const sel = comboSelections[combo.id] || '';
    const badgeSel = comboBadgeSelections[combo.id] || '';
    const save = combo.originalPrice - combo.salePrice;
    const badgeRow = combo.hasBadgeSelect ? `
        <div class="combo-select-row">
          <span class="combo-select-label">選擇徽章款式：</span>
          <select class="combo-select" id="badge-sel-${combo.id}" onchange="setComboBadgeSel('${combo.id}', this.value)">
            <option value="">── 請選擇 ──</option>
            ${BADGE_OPTIONS.map(opt => `<option value="${opt}" ${badgeSel === opt ? 'selected' : ''}>${opt}</option>`).join('')}
          </select>
        </div>` : '';
    return `
      <div class="combo-card ${qty > 0 ? 'in-cart' : ''}" id="card-${combo.id}">
        <div class="combo-title">${combo.title}</div>
        <div class="combo-items">${combo.desc}</div>
        <div class="combo-select-row">
          <span class="combo-select-label">${combo.selectLabel}：</span>
          <select class="combo-select" id="sel-${combo.id}" onchange="setComboSel('${combo.id}', this.value)">
            <option value="">── 請選擇 ──</option>
            ${CANDY_OPTIONS.map(opt => `<option value="${opt}" ${sel === opt ? 'selected' : ''}>${opt}</option>`).join('')}
          </select>
        </div>
        ${badgeRow}
        <div class="combo-footer">
          <div class="combo-price-block">
            <span class="price-original">NT$ ${combo.originalPrice}</span>
            <span class="price-sale">NT$ ${combo.salePrice}</span>
            <span class="price-save">省 ${save} 元</span>
          </div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeComboQty('${combo.id}',-1)">−</button>
            <span class="qty-display" id="qty-${combo.id}">${qty}</span>
            <button class="qty-btn" onclick="changeComboQty('${combo.id}',1)">+</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ============================================================
// CART LOGIC
// ============================================================
function changeQty(id, delta) {
  cart[id] = Math.max(0, (cart[id] || 0) + delta);
  const el = document.getElementById('qty-' + id);
  if (el) el.textContent = cart[id];
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('in-cart', cart[id] > 0);
  updateCartTotal();
}

function changeComboQty(id, delta) {
  if (delta > 0 && !comboSelections[id]) {
    document.getElementById('sel-' + id).focus();
    alert('請先選擇古早味零食項目');
    return;
  }
  const combo = COMBOS.find(c => c.id === id);
  if (delta > 0 && combo && combo.hasBadgeSelect && !comboBadgeSelections[id]) {
    document.getElementById('badge-sel-' + id).focus();
    alert('請先選擇徽章款式');
    return;
  }
  comboQty[id] = Math.max(0, (comboQty[id] || 0) + delta);
  const el = document.getElementById('qty-' + id);
  if (el) el.textContent = comboQty[id];
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('in-cart', comboQty[id] > 0);
  updateCartTotal();
}

function setComboSel(id, val) {
  comboSelections[id] = val;
}

function setComboBadgeSel(id, val) {
  comboBadgeSelections[id] = val;
}

function calcTotal() {
  let total = 0;

  // Candy & art products
  for (const [id, qty] of Object.entries(cart)) {
    if (qty <= 0) continue;
    const p = [...CANDY_PRODUCTS, ...ART_PRODUCTS].find(x => x.id === id);
    if (p) total += p.price * qty;
  }

  // Sticker discount: if both a2 and a3 in cart for each pair
  const a2q = cart['a2'] || 0;
  const a3q = cart['a3'] || 0;
  const stickerPairs = Math.min(a2q, a3q);
  total -= stickerPairs * 10;

  // Combos
  for (const combo of COMBOS) {
    const qty = comboQty[combo.id] || 0;
    total += combo.salePrice * qty;
  }

  return total;
}

function updateCartTotal() {
  const total = calcTotal();
  document.getElementById('cart-total').textContent = total;
  document.getElementById('modal-total').textContent = total;
}

// ============================================================
// MODAL
// ============================================================
function openModal() {
  buildOrderSummary();
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('checkout-view').style.display = '';
  document.getElementById('success-view').style.display = 'none';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function buildOrderSummary() {
  const list = document.getElementById('order-items-list');
  let rows = '';
  let hasItems = false;

  for (const [id, qty] of Object.entries(cart)) {
    if (qty <= 0) continue;
    const p = [...CANDY_PRODUCTS, ...ART_PRODUCTS].find(x => x.id === id);
    if (!p) continue;
    hasItems = true;
    rows += `<div class="order-item-row">
      <span class="order-item-name">${p.name}</span>
      <span class="order-item-qty">× ${qty}</span>
      <span class="order-item-price">NT$ ${p.price * qty}</span>
    </div>`;
  }

  // Sticker discount
  const a2q = cart['a2'] || 0;
  const a3q = cart['a3'] || 0;
  const stickerPairs = Math.min(a2q, a3q);
  if (stickerPairs > 0) {
    rows += `<div class="order-item-row">
      <span class="order-item-name" style="color:#A07800;">✓ 雙貼紙組合優惠</span>
      <span class="order-item-qty">× ${stickerPairs}</span>
      <span class="order-item-price" style="color:#4A7C59;">- NT$ ${stickerPairs * 10}</span>
    </div>`;
  }

  for (const combo of COMBOS) {
    const qty = comboQty[combo.id] || 0;
    if (qty <= 0) continue;
    hasItems = true;
    const sel = comboSelections[combo.id] || '（未選擇）';
    const badgeSel = combo.hasBadgeSelect ? `、徽章：${comboBadgeSelections[combo.id] || '（未選擇）'}` : '';
    rows += `<div class="order-item-row">
      <span class="order-item-name">${combo.title}<br><span style="font-size:11px;color:var(--text-muted);">古早味：${sel}${badgeSel}</span></span>
      <span class="order-item-qty">× ${qty}</span>
      <span class="order-item-price">NT$ ${combo.salePrice * qty}</span>
    </div>`;
  }

  if (!hasItems) {
    rows = '<div class="empty-cart-msg">購物車是空的，請先選擇商品。</div>';
  }

  list.innerHTML = rows;
  const total = calcTotal();
  document.getElementById('modal-total').textContent = total;
}

// ============================================================
// SUBMIT
// ============================================================
function submitOrder() {
  const dept = document.getElementById('field-dept').value.trim();
  const name = document.getElementById('field-name').value.trim();
  const email = document.getElementById('field-email').value.trim();
  let valid = true;

  // Validate
  const fgDept = document.getElementById('fg-dept');
  if (!dept) { fgDept.classList.add('has-error'); valid = false; } else { fgDept.classList.remove('has-error'); }
  const fgName = document.getElementById('fg-name');
  if (!name) { fgName.classList.add('has-error'); valid = false; } else { fgName.classList.remove('has-error'); }
  const fgEmail = document.getElementById('fg-email');
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  if (!email || !emailOk) { fgEmail.classList.add('has-error'); valid = false; } else { fgEmail.classList.remove('has-error'); }

  if (!valid) return;

  // Check has items
  const total = calcTotal();
  if (total === 0) { alert('請先選擇商品再結帳！'); return; }

  // Build items string
  const itemLines = [];
  for (const [id, qty] of Object.entries(cart)) {
    if (qty <= 0) continue;
    const p = [...CANDY_PRODUCTS, ...ART_PRODUCTS].find(x => x.id === id);
    if (p) itemLines.push(`${p.name} x${qty}`);
  }
  const a2q = cart['a2'] || 0;
  const a3q = cart['a3'] || 0;
  const stickerPairs = Math.min(a2q, a3q);
  if (stickerPairs > 0) itemLines.push(`雙貼紙優惠 x${stickerPairs} (-NT$${stickerPairs * 10})`);
  for (const combo of COMBOS) {
    const qty = comboQty[combo.id] || 0;
    if (qty <= 0) continue;
    const sel = comboSelections[combo.id] || '未選';
    const badgePart = combo.hasBadgeSelect ? `、徽章：${comboBadgeSelections[combo.id] || '未選'}` : '';
    itemLines.push(`${combo.title}【${sel}${badgePart}】 x${qty}`);
  }

  const payload = {
    department: dept,
    name: name,
    email: email,
    items: itemLines.join(' | '),
    total: total
  };

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送出中…';

  fetch(SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(() => {}).finally(() => showSuccess());
}

function showSuccess() {
  document.getElementById('checkout-view').style.display = 'none';
  document.getElementById('success-view').style.display = '';
}

function resetAll() {
  cart = {};
  comboSelections = {};
  comboBadgeSelections = {};
  comboQty = {};
  renderCandyGrid();
  renderArtGrid();
  renderComboGrid();
  updateCartTotal();
  document.getElementById('field-dept').value = '';
  document.getElementById('field-name').value = '';
  document.getElementById('field-email').value = '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = '送出訂單';
  closeModal();
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
</body>
</html>
